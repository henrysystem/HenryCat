<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HenryCat - Netflix Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #141414;
        color: white;
        overflow-x: hidden;
      }
      .movie-card {
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .movie-card:hover {
        transform: scale(1.15);
        z-index: 50;
        box-shadow: 0 10px 40px -5px rgba(229, 9, 20, 0.6);
      }
      .glass {
        background: rgba(20, 20, 20, 0.95);
        backdrop-filter: blur(25px);
      }
      .category-row::-webkit-scrollbar {
        height: 4px;
      }
      .category-row::-webkit-scrollbar-thumb {
        background: rgba(229, 9, 20, 0.5);
        border-radius: 10px;
      }
      .modal-overlay {
        background-color: rgba(0, 0, 0, 0.95);
        z-index: 200;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      const App = () => {
        const [items, setItems] = useState([]);
        const [search, setSearch] = useState("");
        const [syncing, setSyncing] = useState(false);
        const [syncMessage, setSyncMessage] = useState("");
        const [posterRefreshing, setPosterRefreshing] = useState(false);
        const [selectedItem, setSelectedItem] = useState(null);
        const [folderFiles, setFolderFiles] = useState([]);
        const [currentMedia, setCurrentMedia] = useState(null);
        const [hoveredItemId, setHoveredItemId] = useState(null);
        const [previewAudioItemId, setPreviewAudioItemId] = useState(null);
        const [previewMenuItemId, setPreviewMenuItemId] = useState(null);
        const [previewByPath, setPreviewByPath] = useState({});
        const [previewLoadingByPath, setPreviewLoadingByPath] = useState({});
        const [officePreviewByPath, setOfficePreviewByPath] = useState({});
        const [officePreviewLoadingByPath, setOfficePreviewLoadingByPath] =
          useState({});
        const [fontGalleryOpen, setFontGalleryOpen] = useState(false);
        const [fontGalleryItem, setFontGalleryItem] = useState(null);
        const [fontGalleryText, setFontGalleryText] = useState("HENRY");
        const [fontGalleryOffset, setFontGalleryOffset] = useState(0);
        const [fontGalleryFonts, setFontGalleryFonts] = useState([]);
        const [fontGalleryHasMore, setFontGalleryHasMore] = useState(false);
        const [fontGalleryTotal, setFontGalleryTotal] = useState(0);
        const [fontGalleryLoading, setFontGalleryLoading] = useState(false);
        const [fontGalleryError, setFontGalleryError] = useState("");
        const [copiedFontName, setCopiedFontName] = useState("");
        const [fontPreviewText, setFontPreviewText] = useState(
          "Sphinx of black quartz, judge my vow. 1234567890",
        );
        const [chatOpen, setChatOpen] = useState(false);
        const [chatMessages, setChatMessages] = useState([
          {
            role: "ai",
            text: "¡Hola Henry! Soy tu cerebro digital. Pega tu Gemini API Key arriba para empezar a hablar con tus archivos.",
          },
        ]);
        const [chatInput, setChatInput] = useState("");
        const [apiKey, setApiKey] = useState(
          localStorage.getItem("gemini_key") || "",
        );
        const [modelName, setModelName] = useState(
          localStorage.getItem("gemini_model") || "gemini-2.0-flash",
        );
        const [loadingChat, setLoadingChat] = useState(false);
        const [loadingModels, setLoadingModels] = useState(false);
        const [deletingPath, setDeletingPath] = useState("");
        const [movingPath, setMovingPath] = useState("");
        const [detailMenuOpen, setDetailMenuOpen] = useState(false);
        const [modelOptions, setModelOptions] = useState([]);
        const rowRefs = useRef({});

        useEffect(() => {
          fetchCatalog();
        }, []);

        const fetchCatalog = async () => {
          const response = await fetch("/catalog");
          const data = await response.json();
          setItems(data);
        };

        const handleSync = async () => {
          if (syncing) return;
          setSyncing(true);
          setSyncMessage("Sincronizando catalogo...");

          try {
            const response = await fetch("/sync", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({}),
            });

            const data = await response.json();
            if (!response.ok) {
              throw new Error(data.detail || "No se pudo sincronizar");
            }

            await fetchCatalog();
            setSyncMessage(
              `Sync completada: ${data.items_detected} items en ${data.duration_seconds}s`,
            );
          } catch (e) {
            setSyncMessage(`Error de sync: ${e.message}`);
          } finally {
            setSyncing(false);
          }
        };

        const handleTrainAI = async () => {
          await fetch("/train_ai", { method: "POST" });
          alert(
            "Entrenamiento profundo iniciado. Esto recorrerá todos tus módulos y videos para darte respuestas exactas. Verás el progreso en la terminal.",
          );
        };

        const handleImprovePosters = async () => {
          if (posterRefreshing) return;
          setPosterRefreshing(true);
          setSyncMessage("Mejorando portadas faltantes...");

          try {
            const response = await fetch("/posters/fill_missing", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ only_missing: true }),
            });
            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.detail || "No se pudieron mejorar las portadas");
            }

            await fetchCatalog();
            setSyncMessage(
              `Portadas actualizadas: ${data.updated}/${data.processed} (fallidas: ${data.failed})`,
            );
          } catch (e) {
            setSyncMessage(`Error mejorando portadas: ${e.message}`);
          } finally {
            setPosterRefreshing(false);
          }
        };

        const handleChat = async () => {
          if (!chatInput.trim() || loadingChat) return;
          const userMsg = { role: "user", text: chatInput };
          setChatMessages([...chatMessages, userMsg]);
          setChatInput("");
          setLoadingChat(true);

          try {
            const response = await fetch("/chat", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                message: chatInput,
                api_key: apiKey,
                model: modelName,
              }),
            });
            const data = await response.json();
            const modelTag = data.model ? `\n\n[modelo: ${data.model}]` : "";
            setChatMessages((prev) => [
              ...prev,
              { role: "ai", text: `${data.response}${modelTag}` },
            ]);
          } catch (e) {
            setChatMessages((prev) => [
              ...prev,
              { role: "ai", text: "Hubo un error al conectar con el cerebro." },
            ]);
          }
          setLoadingChat(false);
        };

        const handleLoadModels = async () => {
          if (!apiKey || loadingModels) return;
          setLoadingModels(true);

          try {
            const response = await fetch("/models", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ api_key: apiKey }),
            });
            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.detail || "No se pudieron obtener modelos");
            }

            setModelOptions(data.models || []);
            if (
              (data.models || []).length > 0 &&
              !data.models.includes(modelName)
            ) {
              saveModel(data.models[0]);
            }
            setChatMessages((prev) => [
              ...prev,
              {
                role: "ai",
                text: `Modelos disponibles cargados: ${(data.models || []).length}`,
              },
            ]);
          } catch (e) {
            setChatMessages((prev) => [
              ...prev,
              { role: "ai", text: `No pude listar modelos: ${e.message}` },
            ]);
          } finally {
            setLoadingModels(false);
          }
        };

        const saveKey = (val) => {
          setApiKey(val);
          localStorage.setItem("gemini_key", val);
        };

        const saveModel = (val) => {
          setModelName(val);
          localStorage.setItem("gemini_model", val);
        };

        const fetchFilesForPath = async (path) => {
          const response = await fetch(
            `/list_files?path=${encodeURIComponent(path)}`,
          );
          return await response.json();
        };

        const isOfficePreviewSupported = (name = "") =>
          /\.(docx|xlsx|pptx)$/i.test(name);

        const isFontPreviewSupported = (name = "") =>
          /\.(ttf|otf|woff2?)$/i.test(name);

        const isAudioFile = (name = "") =>
          /\.(mp3|wav|flac|m4a|aac|ogg)$/i.test(name);

        const fontFamilyNameFor = (file) => {
          const key = file?.full_path || file?.name || "font";
          return `font_preview_${key.replace(/[^a-zA-Z0-9]+/g, "_")}`;
        };

        const safeCssFontUrl = (url = "") => url.replace(/'/g, "%27");

        const galleryFontFamilyNameFor = (font) => {
          const key = font?.full_path || font?.name || "font_gallery";
          return `font_gallery_${key.replace(/[^a-zA-Z0-9]+/g, "_")}`;
        };

        const closeFontGallery = () => {
          setFontGalleryOpen(false);
          setFontGalleryItem(null);
          setFontGalleryFonts([]);
          setFontGalleryOffset(0);
          setFontGalleryHasMore(false);
          setFontGalleryTotal(0);
          setFontGalleryError("");
          setCopiedFontName("");
        };

        const copyFontName = async (fontName) => {
          if (!fontName) return;

          try {
            if (navigator.clipboard?.writeText) {
              await navigator.clipboard.writeText(fontName);
            } else {
              const textarea = document.createElement("textarea");
              textarea.value = fontName;
              document.body.appendChild(textarea);
              textarea.select();
              document.execCommand("copy");
              document.body.removeChild(textarea);
            }
            setCopiedFontName(fontName);
            setTimeout(() => {
              setCopiedFontName((prev) => (prev === fontName ? "" : prev));
            }, 1800);
          } catch {
            alert("No se pudo copiar el nombre de la fuente");
          }
        };

        const loadFontGallery = async ({ item, append = false, offset = 0, text = fontGalleryText }) => {
          if (!item?.path || fontGalleryLoading) return;

          setFontGalleryLoading(true);
          setFontGalleryError("");
          try {
            const response = await fetch(
              `/font_preview_list?path=${encodeURIComponent(item.path)}&text=${encodeURIComponent(text || "HENRY")}&offset=${offset}&limit=120`,
            );
            const data = await response.json();
            if (!response.ok) {
              throw new Error(data.detail || "No se pudo cargar preview de fuentes");
            }

            setFontGalleryItem(item);
            setFontGalleryOpen(true);
            setFontGalleryOffset(data.offset + data.count);
            setFontGalleryHasMore(!!data.has_more);
            setFontGalleryTotal(data.total || 0);
            setFontGalleryFonts((prev) =>
              append ? [...prev, ...(data.fonts || [])] : data.fonts || [],
            );
          } catch (e) {
            setFontGalleryError(`Error: ${e.message}`);
          } finally {
            setFontGalleryLoading(false);
          }
        };

        const openFontGalleryFromItem = async (item, event = null) => {
          if (event) event.stopPropagation();
          setPreviewMenuItemId(null);
          setDetailMenuOpen(false);
          setFontGalleryFonts([]);
          setFontGalleryOffset(0);
          await loadFontGallery({ item, append: false, offset: 0, text: fontGalleryText });
        };

        const applyFontGalleryText = async () => {
          if (!fontGalleryItem) return;
          setFontGalleryFonts([]);
          setFontGalleryOffset(0);
          await loadFontGallery({ item: fontGalleryItem, append: false, offset: 0, text: fontGalleryText });
        };

        const loadMoreFontGallery = async () => {
          if (!fontGalleryItem || !fontGalleryHasMore) return;
          await loadFontGallery({ item: fontGalleryItem, append: true, offset: fontGalleryOffset, text: fontGalleryText });
        };

        const audioFiles = folderFiles.filter((f) => isAudioFile(f.name || ""));
        const currentAudioIndex = audioFiles.findIndex(
          (f) => f.full_path === currentMedia?.full_path,
        );

        const playAudioByIndex = (targetIndex) => {
          if (targetIndex < 0 || targetIndex >= audioFiles.length) return;
          selectMedia(audioFiles[targetIndex]);
        };

        const playNextAudio = () => {
          if (audioFiles.length === 0) return;
          if (currentAudioIndex < 0) {
            playAudioByIndex(0);
            return;
          }
          const nextIndex = (currentAudioIndex + 1) % audioFiles.length;
          playAudioByIndex(nextIndex);
        };

        const playPreviousAudio = () => {
          if (audioFiles.length === 0) return;
          if (currentAudioIndex < 0) {
            playAudioByIndex(0);
            return;
          }
          const prevIndex =
            (currentAudioIndex - 1 + audioFiles.length) % audioFiles.length;
          playAudioByIndex(prevIndex);
        };

        const loadOfficePreview = async (file) => {
          if (!file?.full_path || !isOfficePreviewSupported(file.name)) return;

          if (officePreviewByPath[file.full_path]) return;
          if (officePreviewLoadingByPath[file.full_path]) return;

          setOfficePreviewLoadingByPath((prev) => ({
            ...prev,
            [file.full_path]: true,
          }));

          try {
            const response = await fetch(
              `/office_preview?path=${encodeURIComponent(file.full_path)}`,
            );
            const data = await response.json();
            if (!response.ok) {
              throw new Error(data.detail || "No se pudo generar preview");
            }
            setOfficePreviewByPath((prev) => ({ ...prev, [file.full_path]: data }));
          } catch (e) {
            setOfficePreviewByPath((prev) => ({
              ...prev,
              [file.full_path]: {
                type: "error",
                preview: `No se pudo previsualizar: ${e.message}`,
              },
            }));
          } finally {
            setOfficePreviewLoadingByPath((prev) => ({
              ...prev,
              [file.full_path]: false,
            }));
          }
        };

        const selectMedia = (file) => {
          setCurrentMedia(file);
          if (isOfficePreviewSupported(file?.name || "")) {
            loadOfficePreview(file);
          }
        };

        const openDetail = async (item) => {
          setSelectedItem(item);
          setDetailMenuOpen(false);
          const files = await fetchFilesForPath(item.path);
          setFolderFiles(files);
          const first = files.length > 0 ? files[0] : null;
          setCurrentMedia(first);
          if (first && isOfficePreviewSupported(first.name)) {
            loadOfficePreview(first);
          }
        };

        const openExternal = (path) =>
          fetch(`/open_external?path=${encodeURIComponent(path)}`);

        const deletePath = async (targetPath, mode) => {
          if (!targetPath || deletingPath) return;

          const label = mode === "item" ? "este elemento completo" : "este archivo";
          const confirmMsg = `Vas a borrar ${label}. Esta accion no se puede deshacer.\n\nRuta:\n${targetPath}`;
          if (!window.confirm(confirmMsg)) return;

          setDeletingPath(targetPath);
          try {
            const response = await fetch("/delete_path", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ path: targetPath, remove_from_catalog: true }),
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.detail || "No se pudo borrar");

            if (mode === "item") {
              setDetailMenuOpen(false);
              setSelectedItem(null);
              setCurrentMedia(null);
              setFolderFiles([]);
              await fetchCatalog();
              return;
            }

            const remainingFiles = folderFiles.filter(
              (f) => f.full_path !== targetPath,
            );
            setFolderFiles(remainingFiles);
            if (currentMedia?.full_path === targetPath) {
              setCurrentMedia(remainingFiles.length > 0 ? remainingFiles[0] : null);
            }

            if (selectedItem?.path && mode === "file") {
              const files = await fetchFilesForPath(selectedItem.path);
              setFolderFiles(files);
              if (currentMedia?.full_path === targetPath) {
                setCurrentMedia(files.length > 0 ? files[0] : null);
              }
            }
          } catch (e) {
            alert(`Error al borrar: ${e.message}`);
          } finally {
            setDeletingPath("");
          }
        };

        const getSeparator = (path) => (path.includes("\\") ? "\\" : "/");

        const getBaseName = (path) => {
          const normalized = path.replace(/\\/g, "/");
          const parts = normalized.split("/").filter(Boolean);
          return parts.length > 0 ? parts[parts.length - 1] : path;
        };

        const getParentPath = (path) => {
          const sep = getSeparator(path);
          const normalized = path.replace(/\\/g, "/");
          const idx = normalized.lastIndexOf("/");
          if (idx <= 0) return path;
          const parent = normalized.slice(0, idx);
          return sep === "\\" ? parent.replace(/\//g, "\\") : parent;
        };

        const joinPath = (parent, name) => {
          const sep = getSeparator(parent);
          const cleanParent = parent.replace(/[\\/]+$/, "");
          const cleanName = name.replace(/^[\\/]+/, "");
          return `${cleanParent}${sep}${cleanName}`;
        };

        const moveSelectedItem = async (mode) => {
          if (!selectedItem?.path || movingPath) return;

          const sourcePath = selectedItem.path;
          const currentName = getBaseName(sourcePath);
          const parentPath = getParentPath(sourcePath);
          let destinationPath = "";

          if (mode === "rename") {
            const newName = window.prompt("Nuevo nombre:", currentName);
            if (!newName || !newName.trim()) return;
            destinationPath = joinPath(parentPath, newName.trim());
          } else {
            const destinationFolder = window.prompt(
              "Carpeta destino (ruta completa):",
              parentPath,
            );
            if (!destinationFolder || !destinationFolder.trim()) return;
            destinationPath = joinPath(destinationFolder.trim(), currentName);
          }

          if (destinationPath === sourcePath) return;

          setMovingPath(sourcePath);
          try {
            const response = await fetch("/move_path", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                source_path: sourcePath,
                destination_path: destinationPath,
                update_catalog: true,
              }),
            });
            const data = await response.json();
            if (!response.ok) {
              throw new Error(data.detail || "No se pudo mover el elemento");
            }

            setDetailMenuOpen(false);
            setSelectedItem(null);
            setCurrentMedia(null);
            setFolderFiles([]);
            await fetchCatalog();
          } catch (e) {
            alert(`Error al mover/renombrar: ${e.message}`);
          } finally {
            setMovingPath("");
          }
        };

        const loadItemPreview = async (item) => {
          if (
            !item?.path ||
            previewByPath[item.path] ||
            previewLoadingByPath[item.path]
          )
            return;

          setPreviewLoadingByPath((prev) => ({ ...prev, [item.path]: true }));
          try {
            const response = await fetch(
              `/item_preview?path=${encodeURIComponent(item.path)}`,
            );
            const data = await response.json();
            if (response.ok) {
              setPreviewByPath((prev) => ({ ...prev, [item.path]: data }));
            }
          } catch (_) {
            // Preview opcional: fallar silenciosamente para no romper UX.
          } finally {
            setPreviewLoadingByPath((prev) => ({
              ...prev,
              [item.path]: false,
            }));
          }
        };

        const handleCardHover = (item) => {
          setHoveredItemId(item.id);
          loadItemPreview(item);
        };

        const togglePreviewAudio = (item, event) => {
          event.stopPropagation();
          setPreviewAudioItemId((prev) => (prev === item.id ? null : item.id));
        };

        const togglePreviewMenu = (item, event) => {
          event.stopPropagation();
          setPreviewMenuItemId((prev) => (prev === item.id ? null : item.id));
        };

        const deleteFromPreview = async (item, event) => {
          event.stopPropagation();
          setPreviewMenuItemId(null);
          await deletePath(item.path, "item");
        };

        const filteredItems = items.filter((i) =>
          i.name.toLowerCase().includes(search.toLowerCase()),
        );
        const subcategories = [
          ...new Set(filteredItems.map((i) => i.subcategory)),
        ].sort();

        return (
          <div className="min-h-screen pb-20 relative">
            {/* Header */}
            <nav className="glass sticky top-0 z-[100] px-10 py-5 flex items-center justify-between">
              <h1 className="text-4xl font-black text-red-600 tracking-tighter italic uppercase">
                HenryCat
              </h1>
              <div className="flex items-center gap-6">
                <input
                  type="text"
                  placeholder="Buscar..."
                  className="bg-white/5 border border-white/10 focus:border-red-600 px-6 py-2 rounded-full text-xs w-80 focus:outline-none"
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                />
                <button
                  onClick={handleSync}
                  disabled={syncing}
                  className="bg-white/5 hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed px-6 py-2 rounded-full text-xs font-bold uppercase"
                >
                  {syncing ? "Sincronizando..." : "Sincronizar"}
                </button>
                <button
                  onClick={handleTrainAI}
                  className="bg-red-600 px-6 py-2 rounded-full text-xs font-black hover:bg-red-700 shadow-lg"
                >
                  ENTRENAMIENTO PROFUNDO
                </button>
                <button
                  onClick={handleImprovePosters}
                  disabled={posterRefreshing}
                  className="bg-white/5 hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed px-6 py-2 rounded-full text-xs font-bold uppercase"
                >
                  {posterRefreshing ? "Mejorando Portadas..." : "Mejorar Portadas"}
                </button>
              </div>
            </nav>
            {syncMessage && (
              <div className="px-10 pt-4 text-xs text-white/70">
                {syncMessage}
              </div>
            )}

            {/* Catálogo */}
            <div className="mt-10">
              {subcategories.map((sub) => (
                <div key={sub} className="mb-12 px-10">
                  <h2 className="text-xl font-black mb-6 flex items-center gap-3 italic uppercase text-white/90">
                    <span className="w-1 h-6 bg-red-600 rounded-full"></span>
                    {sub}
                  </h2>
                  <div className="flex overflow-x-auto gap-6 pb-5 category-row custom-scrollbar">
                    {filteredItems
                      .filter((i) => i.subcategory === sub)
                      .map((item) => (
                        <div
                          key={item.id}
                          className="movie-card flex-none w-44 bg-[#181818] rounded-lg overflow-hidden border border-white/5 cursor-pointer group"
                          onClick={() => openDetail(item)}
                          onMouseEnter={() => handleCardHover(item)}
                          onMouseLeave={() => {
                            setHoveredItemId(null);
                            setPreviewAudioItemId(null);
                            setPreviewMenuItemId(null);
                          }}
                        >
                          <div className="h-64 overflow-hidden relative">
                            {hoveredItemId === item.id &&
                            previewByPath[item.path]?.video_url ? (
                              <video
                                src={previewByPath[item.path].video_url}
                                className="w-full h-full object-cover"
                                autoPlay
                                muted={previewAudioItemId !== item.id}
                                loop
                                playsInline
                              />
                            ) : item.poster ? (
                              <img
                                src={item.poster}
                                className="w-full h-full object-cover"
                                alt={item.name}
                              />
                            ) : (
                              <div className="w-full h-full bg-gradient-to-br from-gray-800 to-black flex items-center justify-center p-4 text-center text-[10px] font-black uppercase text-gray-500">
                                {item.name}
                              </div>
                            )}
                            <div className="absolute inset-0 bg-black/30 group-hover:bg-transparent"></div>
                            {hoveredItemId === item.id && (
                              <>
                                <button
                                  onClick={(e) => togglePreviewMenu(item, e)}
                                  className="absolute top-4 right-2 z-20 bg-black/60 hover:bg-black/80 text-white text-xs px-2 py-0.5 rounded-md"
                                >
                                  ...
                                </button>
                                {previewMenuItemId === item.id && (
                                  <div className="absolute top-10 right-2 z-30 bg-[#1b1b1b] border border-white/10 rounded-lg p-1 shadow-xl min-w-[130px]">
                                    <button
                                      onClick={(e) => openFontGalleryFromItem(item, e)}
                                      disabled={fontGalleryLoading}
                                      className="w-full text-left bg-white/5 hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed py-2 px-2 rounded-md text-[10px] font-black uppercase text-gray-200"
                                    >
                                      Preview Fuentes
                                    </button>
                                    <button
                                      onClick={(e) => deleteFromPreview(item, e)}
                                      disabled={deletingPath === item.path || !!movingPath}
                                      className="mt-1 w-full text-left bg-red-900/60 hover:bg-red-800/70 disabled:opacity-50 disabled:cursor-not-allowed py-2 px-2 rounded-md text-[10px] font-black uppercase text-red-100"
                                    >
                                      {deletingPath === item.path ? "Borrando..." : "Borrar Elemento"}
                                    </button>
                                  </div>
                                )}
                              </>
                            )}
                            {hoveredItemId === item.id &&
                              previewByPath[item.path]?.video_url && (
                                <button
                                  onClick={(e) => togglePreviewAudio(item, e)}
                                  className="absolute bottom-2 right-2 z-20 bg-black/60 hover:bg-black/80 text-white text-[10px] px-2 py-1 rounded-md"
                                >
                                  {previewAudioItemId === item.id
                                    ? "Silenciar"
                                    : "Audio"}
                                </button>
                              )}
                          </div>
                          <div className="p-3 bg-gradient-to-t from-black to-transparent">
                            <h3 className="text-[11px] font-bold truncate">
                              {item.name}
                            </h3>
                            <p className="text-[8px] text-red-600 mt-1 uppercase font-black tracking-widest">
                              {item.count} ARCHIVOS
                            </p>
                            {hoveredItemId === item.id && (
                              <div className="mt-2 text-[9px] text-white/80 space-y-1 min-h-[34px]">
                                {previewLoadingByPath[item.path] ? (
                                  <p className="text-white/50">
                                    Cargando preview...
                                  </p>
                                ) : (
                                  (previewByPath[item.path]?.files || [])
                                    .slice(0, 2)
                                    .map((f) => (
                                      <p key={f.full_path} className="truncate">
                                        - {f.name}
                                      </p>
                                    ))
                                )}
                              </div>
                            )}
                          </div>
                        </div>
                      ))}
                  </div>
                </div>
              ))}
            </div>

            {/* CHAT FLOTANTE */}
            <div className="fixed bottom-10 right-10 z-[300]">
              {chatOpen ? (
                <div className="chat-window flex flex-col overflow-hidden animate-in slide-in-from-bottom-10 duration-300">
                  <div className="p-5 bg-[#1a1a1a] flex flex-col border-b border-white/5">
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="text-sm font-black uppercase italic tracking-tighter text-red-600">
                        Brain / HenryCat
                      </h3>
                      <button
                        onClick={() => setChatOpen(false)}
                        className="text-gray-500 hover:text-white text-xl"
                      >
                        &times;
                      </button>
                    </div>
                    <input
                      type="password"
                      placeholder="Pegar Gemini API Key..."
                      className="bg-black border border-white/10 rounded-lg px-3 py-1.5 text-[10px] focus:border-red-600 outline-none w-full"
                      value={apiKey}
                      onChange={(e) => saveKey(e.target.value)}
                    />
                    <button
                      onClick={handleLoadModels}
                      disabled={!apiKey || loadingModels}
                      className="mt-2 bg-white/10 hover:bg-white/20 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg px-3 py-1.5 text-[10px] w-full text-left"
                    >
                      {loadingModels
                        ? "Cargando modelos..."
                        : "Cargar modelos disponibles"}
                    </button>
                    {modelOptions.length > 0 ? (
                      <select
                        className="mt-2 bg-black border border-white/10 rounded-lg px-3 py-1.5 text-[10px] focus:border-red-600 outline-none w-full"
                        value={modelName}
                        onChange={(e) => saveModel(e.target.value)}
                      >
                        {modelOptions.map((m) => (
                          <option key={m} value={m}>
                            {m}
                          </option>
                        ))}
                      </select>
                    ) : (
                      <input
                        type="text"
                        placeholder="Modelo (ej: gemini-2.5-flash)"
                        className="mt-2 bg-black border border-white/10 rounded-lg px-3 py-1.5 text-[10px] focus:border-red-600 outline-none w-full"
                        value={modelName}
                        onChange={(e) => saveModel(e.target.value)}
                      />
                    )}
                  </div>
                  <div className="flex-1 overflow-y-auto p-5 space-y-4 custom-scrollbar bg-black/20">
                    {chatMessages.map((m, i) => (
                      <div
                        key={i}
                        className={`flex ${m.role === "user" ? "justify-end" : "justify-start"}`}
                      >
                        <div
                          className={`max-w-[85%] p-4 rounded-2xl text-xs leading-relaxed ${m.role === "user" ? "bg-red-600 text-white font-bold" : "bg-[#222] text-gray-300 border border-white/5"}`}
                        >
                          <p className="whitespace-pre-wrap">{m.text}</p>
                        </div>
                      </div>
                    ))}
                    {loadingChat && (
                      <div className="text-[10px] text-red-600 animate-pulse font-black uppercase tracking-widest">
                        HenryCat está pensando...
                      </div>
                    )}
                  </div>
                  <div className="p-4 bg-[#1a1a1a] flex gap-2">
                    <input
                      type="text"
                      placeholder="Pregúntame detalles de tus cursos..."
                      className="flex-1 bg-black border border-white/10 rounded-full px-5 py-2.5 text-xs focus:border-red-600 outline-none"
                      value={chatInput}
                      onChange={(e) => setChatInput(e.target.value)}
                      onKeyPress={(e) => e.key === "Enter" && handleChat()}
                    />
                    <button
                      onClick={handleChat}
                      className="bg-red-600 w-10 h-10 rounded-full text-white flex items-center justify-center hover:bg-red-700 transition-all shadow-lg shadow-red-600/30"
                    >
                      🚀
                    </button>
                  </div>
                </div>
              ) : (
                <button
                  onClick={() => setChatOpen(true)}
                  className="bg-red-600 w-16 h-16 rounded-full shadow-[0_10px_40px_rgba(229,9,20,0.5)] flex items-center justify-center text-3xl hover:scale-110 active:scale-95 transition-all border-4 border-white/10"
                >
                  🧠
                </button>
              )}
            </div>

            {/* MODAL PREVIEW FUENTES */}
            {fontGalleryOpen && (
              <div className="modal-overlay fixed inset-0 overflow-y-auto pt-8 px-6 pb-8 flex items-start justify-center z-[350]">
                <div className="w-full max-w-6xl bg-[#101010] rounded-2xl overflow-hidden shadow-2xl border border-white/10 flex flex-col min-h-[80vh]">
                  <div className="p-5 bg-[#181818] border-b border-white/10 flex items-center justify-between gap-4">
                    <div>
                      <h2 className="text-lg font-black uppercase text-white">Preview de Fuentes</h2>
                      <p className="text-[11px] text-white/60 mt-1">
                        {fontGalleryItem?.name || "Elemento"} - {fontGalleryTotal} fuente(s)
                      </p>
                    </div>
                    <button
                      onClick={closeFontGallery}
                      className="text-gray-400 hover:text-white text-3xl leading-none"
                    >
                      &times;
                    </button>
                  </div>

                  <div className="p-4 bg-[#141414] border-b border-white/10 flex items-center gap-3">
                    <input
                      type="text"
                      value={fontGalleryText}
                      onChange={(e) => setFontGalleryText(e.target.value)}
                      className="flex-1 bg-black/60 border border-white/10 rounded-lg px-3 py-2 text-xs text-white"
                      placeholder="Texto de muestra (ej: HENRY)"
                    />
                    <button
                      onClick={applyFontGalleryText}
                      disabled={fontGalleryLoading}
                      className="bg-white/5 hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed px-4 py-2 rounded-lg text-[11px] font-black uppercase"
                    >
                      Aplicar
                    </button>
                  </div>

                  <div className="p-4 overflow-y-auto custom-scrollbar flex-1">
                    {fontGalleryError && (
                      <div className="mb-3 text-red-300 text-xs bg-red-900/30 border border-red-900/40 rounded-lg p-3">
                        {fontGalleryError}
                      </div>
                    )}

                    <style>
                      {fontGalleryFonts
                        .map(
                          (font) =>
                            `@font-face { font-family: '${galleryFontFamilyNameFor(font)}'; src: url('${safeCssFontUrl(font.url)}'); }`,
                        )
                        .join("\n")}
                    </style>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                      {fontGalleryFonts.map((font) => (
                        <div key={font.full_path} className="bg-black/40 border border-white/10 rounded-xl p-4">
                          <div className="flex items-center justify-between gap-2 mb-2">
                            <p className="text-[11px] font-black text-white truncate">{font.name}</p>
                            <div className="flex items-center gap-2">
                              <p className="text-[10px] text-white/50">{font.size_kb} KB</p>
                              <button
                                onClick={() => copyFontName(font.name)}
                                className="bg-white/5 hover:bg-white/10 px-2 py-1 rounded text-[9px] font-black uppercase"
                              >
                                {copiedFontName === font.name ? "Copiado" : "Copiar"}
                              </button>
                            </div>
                          </div>
                          <div className="flex flex-wrap gap-1 mb-3">
                            {(font.characteristics || []).slice(0, 4).map((tag) => (
                              <span key={`${font.full_path}_${tag}`} className="text-[9px] bg-white/10 text-white/70 px-2 py-0.5 rounded-full uppercase">
                                {tag}
                              </span>
                            ))}
                          </div>
                          <p
                            className="text-3xl leading-tight text-white/95 break-words"
                            style={{ fontFamily: galleryFontFamilyNameFor(font) }}
                          >
                            {fontGalleryText || "HENRY"}
                          </p>
                        </div>
                      ))}
                    </div>

                    {fontGalleryLoading && (
                      <p className="text-xs text-white/60 mt-4">Cargando fuentes...</p>
                    )}

                    {!fontGalleryLoading && fontGalleryHasMore && (
                      <button
                        onClick={loadMoreFontGallery}
                        className="mt-4 bg-white/5 hover:bg-white/10 px-4 py-2 rounded-lg text-[11px] font-black uppercase"
                      >
                        Cargar mas
                      </button>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* MODAL DETALLE */}
            {selectedItem && (
              <div className="modal-overlay fixed inset-0 overflow-y-auto pt-5 px-10 pb-10 flex items-center justify-center">
                <div className="w-full max-w-7xl bg-[#111] rounded-2xl overflow-hidden shadow-2xl border border-white/5 flex flex-col h-[90vh]">
                  <div className="p-6 flex justify-between items-center bg-[#181818] border-b border-white/5">
                    <h2 className="text-xl font-black text-white uppercase italic tracking-tighter">
                      {selectedItem.name}
                    </h2>
                    <button
                      onClick={() => {
                        setDetailMenuOpen(false);
                        setSelectedItem(null);
                        setCurrentMedia(null);
                      }}
                      className="text-gray-500 hover:text-white text-4xl leading-none"
                    >
                      &times;
                    </button>
                  </div>
                  <div className="flex-1 flex overflow-hidden">
                    <div className="w-80 bg-[#141414] border-r border-white/5 overflow-y-auto p-4 custom-scrollbar">
                      <div className="space-y-1.5">
                        {folderFiles.map((file, idx) => (
                          <div
                            key={idx}
                            onClick={() => selectMedia(file)}
                            className={`p-3 rounded-lg text-[11px] cursor-pointer transition-all flex items-center gap-3 ${currentMedia === file ? "bg-red-600 text-white font-bold shadow-lg" : "text-gray-400 hover:bg-white/5 hover:text-white"}`}
                          >
                            <span className="truncate">{file.name}</span>
                          </div>
                        ))}
                      </div>
                      <button
                        onClick={() => openExternal(selectedItem.path)}
                        className="mt-10 w-full bg-white/5 py-4 rounded-xl text-[10px] font-black uppercase text-gray-500 hover:text-white"
                      >
                        📁 Abrir Carpeta
                      </button>
                      <div className="mt-2 relative" onMouseLeave={() => setDetailMenuOpen(false)}>
                        <button
                          onClick={() => setDetailMenuOpen((prev) => !prev)}
                          className="w-full bg-white/5 hover:bg-white/10 py-3 rounded-xl text-[10px] font-black uppercase text-gray-300"
                        >
                          ... Opciones
                        </button>
                        {detailMenuOpen && (
                          <div className="absolute right-0 mt-2 w-full bg-[#1b1b1b] border border-white/10 rounded-xl p-2 z-30 shadow-xl">
                            <button
                              onClick={() => moveSelectedItem("rename")}
                              disabled={!!movingPath || !!deletingPath}
                              className="w-full text-left bg-white/5 hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed py-3 px-3 rounded-lg text-[10px] font-black uppercase text-gray-200"
                            >
                              {movingPath ? "Procesando..." : "Renombrar Elemento"}
                            </button>
                            <button
                              onClick={() => moveSelectedItem("move")}
                              disabled={!!movingPath || !!deletingPath}
                              className="mt-2 w-full text-left bg-white/5 hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed py-3 px-3 rounded-lg text-[10px] font-black uppercase text-gray-200"
                            >
                              {movingPath ? "Procesando..." : "Mover Elemento"}
                            </button>
                            <button
                              onClick={() => openFontGalleryFromItem(selectedItem)}
                              disabled={fontGalleryLoading || !!movingPath || !!deletingPath}
                              className="mt-2 w-full text-left bg-white/5 hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed py-3 px-3 rounded-lg text-[10px] font-black uppercase text-gray-200"
                            >
                              {fontGalleryLoading ? "Cargando Fuentes..." : "Preview Fuentes"}
                            </button>
                            <button
                              onClick={() => {
                                setDetailMenuOpen(false);
                                deletePath(selectedItem.path, "item");
                              }}
                              disabled={deletingPath === selectedItem.path || !!movingPath}
                              className="mt-2 w-full text-left bg-red-900/60 hover:bg-red-800/70 disabled:opacity-50 disabled:cursor-not-allowed py-3 px-3 rounded-lg text-[10px] font-black uppercase text-red-100"
                            >
                              {deletingPath === selectedItem.path
                                ? "Borrando..."
                                : "Borrar Elemento"}
                            </button>
                          </div>
                        )}
                      </div>
                      {currentMedia && (
                        <button
                          onClick={() => deletePath(currentMedia.full_path, "file")}
                          disabled={deletingPath === currentMedia.full_path || !!movingPath}
                          className="mt-2 w-full bg-red-700/50 hover:bg-red-700/70 disabled:opacity-50 disabled:cursor-not-allowed py-3 rounded-xl text-[10px] font-bold uppercase text-red-50"
                        >
                          {deletingPath === currentMedia.full_path
                            ? "Borrando..."
                            : "Borrar Archivo Seleccionado"}
                        </button>
                      )}
                    </div>
                    <div className="flex-1 bg-black flex items-center justify-center overflow-hidden">
                      {currentMedia ? (
                        <div className="w-full h-full p-2">
                          {currentMedia.name.toLowerCase().endsWith(".pdf") ? (
                            <iframe
                              src={currentMedia.url}
                              className="w-full h-full rounded-lg bg-white shadow-2xl"
                            ></iframe>
                          ) : currentMedia.name
                              .toLowerCase()
                              .match(/\.(mp4|mkv|avi)$/) ? (
                            <video
                              key={currentMedia.url}
                              src={currentMedia.url}
                              controls
                              autoPlay
                              className="w-full h-full rounded-lg shadow-2xl"
                            ></video>
                          ) : isAudioFile(currentMedia.name) ? (
                            <div className="w-full h-full rounded-lg bg-[#111] border border-white/10 p-6 flex flex-col justify-center">
                              <div className="flex items-center justify-between mb-4 gap-3">
                                <h3 className="text-sm font-black uppercase text-white/80">
                                  Reproductor de audio
                                </h3>
                                <p className="text-[11px] text-white/60">
                                  {currentAudioIndex >= 0
                                    ? `${currentAudioIndex + 1}/${audioFiles.length}`
                                    : `${audioFiles.length} pistas`}
                                </p>
                              </div>
                              <p className="text-white/70 text-sm mb-4">{currentMedia.name}</p>
                              <div className="flex gap-2 mb-4">
                                <button
                                  onClick={playPreviousAudio}
                                  disabled={audioFiles.length <= 1}
                                  className="bg-white/5 hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed px-3 py-2 rounded-lg text-[11px] font-bold uppercase"
                                >
                                  Anterior
                                </button>
                                <button
                                  onClick={playNextAudio}
                                  disabled={audioFiles.length <= 1}
                                  className="bg-white/5 hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed px-3 py-2 rounded-lg text-[11px] font-bold uppercase"
                                >
                                  Siguiente
                                </button>
                              </div>
                              <audio
                                key={currentMedia.url}
                                src={currentMedia.url}
                                controls
                                autoPlay
                                onEnded={playNextAudio}
                                className="w-full"
                              ></audio>
                            </div>
                          ) : isOfficePreviewSupported(currentMedia.name) ? (
                            <div className="w-full h-full rounded-lg bg-[#111] border border-white/10 p-6 overflow-y-auto custom-scrollbar">
                              <div className="flex items-center justify-between mb-4">
                                <h3 className="text-sm font-black uppercase text-white/80">
                                  Vista previa Office
                                </h3>
                                <button
                                  onClick={() => openExternal(currentMedia.full_path)}
                                  className="bg-red-600 px-4 py-2 rounded-lg text-[11px] font-black hover:bg-red-700"
                                >
                                  Abrir externo
                                </button>
                              </div>
                              {officePreviewLoadingByPath[currentMedia.full_path] ? (
                                <p className="text-white/60 text-sm">Generando vista previa...</p>
                              ) : (
                                <pre className="text-[12px] leading-relaxed whitespace-pre-wrap text-white/85">
                                  {officePreviewByPath[currentMedia.full_path]?.preview ||
                                    "Sin contenido legible para mostrar."}
                                </pre>
                              )}
                            </div>
                          ) : isFontPreviewSupported(currentMedia.name) ? (
                            <div className="w-full h-full rounded-lg bg-[#111] border border-white/10 p-6 overflow-y-auto custom-scrollbar">
                              <style>{`@font-face { font-family: '${fontFamilyNameFor(currentMedia)}'; src: url('${safeCssFontUrl(currentMedia.url)}'); }`}</style>
                              <div className="flex items-center justify-between mb-4 gap-3">
                                <h3 className="text-sm font-black uppercase text-white/80">Vista previa de fuente</h3>
                                <button
                                  onClick={() => openExternal(currentMedia.full_path)}
                                  className="bg-red-600 px-4 py-2 rounded-lg text-[11px] font-black hover:bg-red-700"
                                >
                                  Abrir externo
                                </button>
                              </div>
                              <input
                                type="text"
                                value={fontPreviewText}
                                onChange={(e) => setFontPreviewText(e.target.value)}
                                className="w-full mb-4 bg-black/60 border border-white/10 rounded-lg px-3 py-2 text-xs text-white"
                                placeholder="Escribe texto para probar la fuente"
                              />
                              <div
                                className="rounded-lg border border-white/10 bg-black/40 p-5 min-h-[220px]"
                                style={{ fontFamily: fontFamilyNameFor(currentMedia) }}
                              >
                                <p className="text-4xl leading-tight mb-4">{fontPreviewText || "Texto de muestra"}</p>
                                <p className="text-2xl mb-2">ABCDEFGHIJKLMN NOPQRSTUVWXYZ</p>
                                <p className="text-2xl mb-2">abcdefghijklmn nopqrstuvwxyz</p>
                                <p className="text-xl">0123456789 !@#$%&*()[]{}-_=+;:,./?</p>
                              </div>
                            </div>
                          ) : (
                            <div className="flex flex-col items-center justify-center h-full text-center text-white">
                              <div className="text-7xl mb-4">⚙️</div>
                              <h3 className="text-2xl font-black mb-10">
                                {currentMedia.name}
                              </h3>
                              <button
                                onClick={() =>
                                  openExternal(currentMedia.full_path)
                                }
                                className="bg-red-600 px-16 py-6 rounded-full font-black text-2xl hover:bg-red-700"
                              >
                                EJECUTAR
                              </button>
                            </div>
                          )}
                        </div>
                      ) : (
                        <div className="text-gray-800 font-black text-4xl opacity-10 uppercase italic">
                          Selecciona para ver
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
